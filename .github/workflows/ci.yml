# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
# Lathe Trainer — GitHub Actions CI Pipeline
#
# Stack: Vite 7 · TypeScript · Vitest · pnpm · Node 22
#
# Jobs
#   ci  — install deps (cached) → security audit → run tests → build → upload artifact
#
# Optional deployment (Netlify) is included as a separate job at the bottom,
# gated behind a manual enable step. See the "deploy" job comments to activate.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Install · Test · Build
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ────────────────────────────────────────────────────────────
      # Node 22 (current LTS). No cache: key here — caching is handled
      # explicitly below with a hardcoded path to avoid pnpm store init issues.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── pnpm ───────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      # ── Dependency cache ───────────────────────────────────────────────────
      # Uses a hardcoded store path (~/.local/share/pnpm/store) to avoid the
      # "packages field missing" error that occurs when pnpm store path is
      # called before the store is initialized on a fresh runner.
      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Security audit ─────────────────────────────────────────────────────
      # Production dependencies only. Fails on high/critical CVEs.
      - name: Security audit
        run: pnpm audit --prod --audit-level=high

      # ── Unit tests ─────────────────────────────────────────────────────────
      - name: Run unit tests
        run: |
          pnpm test -- \
            --reporter=verbose \
            --reporter=junit \
            --outputFile=test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/junit.xml
          retention-days: 30

      # ── Production build ───────────────────────────────────────────────────
      - name: Build (production)
        run: pnpm build
        env:
          VITE_AI_API_KEY: ${{ secrets.VITE_AI_API_KEY }}

      # ── Upload build artifact ──────────────────────────────────────────────
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: lathe-trainer-dist
          path: dist/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Job: deploy (optional — disabled by default)
  #
  # To activate:
  #   1. Uncomment the deploy job below
  #   2. Add repository secrets: NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID
