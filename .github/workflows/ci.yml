# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
# Lathe Trainer — GitHub Actions CI Pipeline
#
# Stack: Vite 7 · TypeScript · Vitest · pnpm · Node 22
#
# Jobs
#   ci  — install deps (cached) → security audit → run tests → build → upload artifact
#
# Optional deployment (Netlify) is included as a separate job at the bottom,
# gated behind a manual enable step. See the "deploy" job comments to activate.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - main          # Run on every push to main
  pull_request:
    branches:
      - main          # Run on every PR targeting main

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job: ci
  # Runs on every push and PR. Installs dependencies, runs the test suite,
  # builds the production bundle, and uploads dist/ as a workflow artifact.
  # ───────────────────────────────────────────────────────────────────────────
  ci:
    name: Install · Test · Build
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── pnpm ───────────────────────────────────────────────────────────────
      # Must be set up BEFORE setup-node so the node step can use pnpm's
      # built-in cache integration. Pinned to major version 9.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── Node.js ────────────────────────────────────────────────────────────
      # Node 22 (current LTS). Node 20 was deprecated on GitHub Actions
      # runners in September 2025. cache: 'pnpm' delegates store caching to
      # the official pnpm integration — no manual cache step needed.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      # ── Install dependencies ───────────────────────────────────────────────
      # --frozen-lockfile: fails loudly if pnpm-lock.yaml is out of sync with
      # package.json — prevents silent lock-file drift in CI.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Security audit ─────────────────────────────────────────────────────
      # Checks production dependencies only (--prod) against the npm advisory
      # database. Only fails on high/critical CVEs — avoids noise from
      # devDependency vulnerabilities that never reach production.
      - name: Security audit
        run: pnpm audit --prod --audit-level=high

      # ── Unit tests ─────────────────────────────────────────────────────────
      # Runs vitest in single-pass mode (vitest run, mapped via pnpm test).
      # The junit reporter writes XML uploaded as an artifact in the next step.
      # VITE_AI_API_KEY is not needed — tests run in Node environment only.
      - name: Run unit tests
        run: |
          pnpm test -- \
            --reporter=verbose \
            --reporter=junit \
            --outputFile=test-results/junit.xml

      # Uploads JUnit XML so test results are browsable in the Actions summary.
      - name: Upload test results
        if: always()    # upload even when tests fail so failures are visible
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/junit.xml
          retention-days: 30

      # ── Production build ───────────────────────────────────────────────────
      # VITE_AI_API_KEY is injected from a GitHub Actions repository secret.
      # Missing key is safe — vite.config.ts guards it with an empty string fallback.
      - name: Build (production)
        run: pnpm build
        env:
          VITE_AI_API_KEY: ${{ secrets.VITE_AI_API_KEY }}

      # ── Upload build artifact ──────────────────────────────────────────────
      # Uploads dist/ so the compiled output is downloadable from every run.
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: lathe-trainer-dist
          path: dist/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Job: deploy (optional — disabled by default)
  #
  # To activate Netlify deployment from GitHub Actions:
  #   1. Uncomment the entire "deploy" job below.
  #   2. Add two repository secrets in GitHub → Settings → Secrets → Actions:
  #        NETLIFY_AUTH_TOKEN  (your personal access token from netlify.com)
  #        NETLIFY_SITE_ID     (found under Site Configuration in Netlify dashboard)
  #   3. Push to main — deployment runs automatically after CI passes.
  # ───────────────────────────────────────────────────────────────────────────

  # deploy:
  #   name: Deploy to Netlify
