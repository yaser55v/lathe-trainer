# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml
# Lathe Trainer — GitHub Actions CI Pipeline
#
# Stack: Vite 7 · TypeScript · Vitest · pnpm · Node 20
#
# Jobs
#   ci  — install deps (cached) → run tests → build → upload dist artifact
#
# Optional deployment (Netlify) is included as a separate job at the bottom,
# gated behind a manual enable step. See the "deploy" job comments to activate.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches:
      - main          # Run on every push to main
  pull_request:
    branches:
      - main          # Run on every PR targeting main

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job: ci
  # Runs on every push and PR. Installs dependencies, runs the test suite,
  # builds the production bundle, and uploads dist/ as a workflow artifact.
  # ───────────────────────────────────────────────────────────────────────────
  ci:
    name: Install · Test · Build
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      # Checks out the repository so the workflow has access to the source.
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ────────────────────────────────────────────────────────────
      # Pins Node 20 to match engines.node >= 20.19.0 in package.json.
      # The built-in pnpm caching is handled separately below for fine-grained
      # cache key control, so we leave cache: '' here.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── pnpm ───────────────────────────────────────────────────────────────
      # Installs pnpm via the official action. Pinned to major version 9 to
      # avoid silent upgrade surprises. run_install: false — we run install
      # ourselves after restoring the cache so the cache step is effective.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # ── Dependency cache ───────────────────────────────────────────────────
      # Caches the pnpm store (downloaded package tarballs) between runs.
      # Cache key includes the OS and pnpm-lock.yaml hash — invalidates only
      # when you add, remove, or update a dependency.
      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Restore pnpm store cache
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      # ── Install dependencies ───────────────────────────────────────────────
      # --frozen-lockfile: fails loudly if pnpm-lock.yaml is out of sync with
      # package.json. This is the correct CI flag — it prevents silent
      # lock-file drift that works locally but breaks in production.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Security audit ─────────────────────────────────────────────────────
      # Checks all installed packages against the npm vulnerability advisory
      # database. --audit-level=high means the step only fails on high or
      # critical severity issues — low/moderate advisories are reported but
      # don't break the build, avoiding excessive noise on minor findings.
      - name: Security audit
        run: pnpm audit --prod --audit-level=high

      # ── Unit tests ─────────────────────────────────────────────────────────
      # Runs vitest in single-pass mode (vitest run, mapped to pnpm test).
      # The junit reporter writes machine-readable XML consumed by the next
      # step. The verbose reporter keeps terminal output readable in the log.
      # VITE_AI_API_KEY is not needed — tests run in Node environment.
      - name: Run unit tests
        run: |
          pnpm test -- \
            --reporter=verbose \
            --reporter=junit \
            --outputFile=test-results/junit.xml

      # Uploads the JUnit XML as a workflow artifact so test results are
      # browsable in the GitHub Actions summary for every run.
      - name: Upload test results
        if: always()    # upload even when tests fail so failures are visible
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/junit.xml
          retention-days: 30

      # ── Production build ───────────────────────────────────────────────────
      # Runs vite build → outputs to dist/
      # VITE_AI_API_KEY is injected from a GitHub Actions repository secret.
      # If the secret is not set the build still succeeds — vite.config.ts
      # guards against a missing key with a fallback empty string.
      - name: Build (production)
        run: pnpm build
        env:
          VITE_AI_API_KEY: ${{ secrets.VITE_AI_API_KEY }}

      # ── Upload build artifact ──────────────────────────────────────────────
      # Uploads dist/ so the compiled output is downloadable from every
      # workflow run without needing to rebuild from source.
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: lathe-trainer-dist
          path: dist/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Job: deploy (optional — disabled by default)
  #
  # To activate Netlify deployment from GitHub Actions:
  #   1. Uncomment the entire "deploy" job below.
  #   2. Add two repository secrets in GitHub → Settings → Secrets → Actions:
  #        NETLIFY_AUTH_TOKEN  (your personal access token from netlify.com)
  #        NETLIFY_SITE_ID     (found under Site Configuration in Netlify dashboard)
  #   3. Push to main — deployment runs automatically after CI passes.
  # ───────────────────────────────────────────────────────────────────────────

  # deploy:
  #   name: Deploy to Netlify
