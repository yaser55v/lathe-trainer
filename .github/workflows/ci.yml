  #     # Deploy to Netlify using the official CLI.
  #     # --prod promotes the deploy to the live URL instead of a preview URL.
  #     - name: Deploy to Netlify (production)
  #       run: |
  #         npm install -g netlify-cli
  #         netlify deploy \
  #           --dir=dist \
