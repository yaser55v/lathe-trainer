  #     # Download the artifact built in the ci job.
  #     # No rebuild required — same dist/ that passed tests.
  #     - name: Download dist artifact
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: lathe-trainer-dist
  #         path: dist/
